[package]
name = "zip-plus"
publish = false
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true

[lib]
bench = false

[dependencies]
crypto-primitives = { workspace = true, features = ["std", "ark_std", "rand"] }

ark-std = "0.5"
ark-ff = "0.5"
ark-serialize = "0.5"

itertools = "0.14"
thiserror = "2.0"
crypto-bigint = { version = "0.7.0-rc.8", features = ["zeroize"] }
displaydoc = "0.2"
sha3 = "0.10"
num-traits = "0.2"
rand = "0.9"
rand_core = "0.9"
rayon = { version = "1.10", optional = true }
blake3 = "1.8.2"
uninit = "0.6.2"
crypto-primes = "0.7.0-pre.3"

[dev-dependencies]
criterion = { workspace = true }
proptest = { workspace = true }

[lints]
workspace = true

[features]
parallel = ["dep:rayon"]
asm = ["ark-ff/asm", "sha3/asm"]

[[bench]]
name = "zip_benches"
harness = false

[[bench]]
name = "zip_plus_benches"
harness = false
