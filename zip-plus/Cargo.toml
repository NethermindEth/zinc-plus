[package]
name = "zip-plus"
publish = false
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true

[lib]
bench = false

[dependencies]
crypto-primitives = { workspace = true, features = ["std", "ark_std", "crypto_bigint", "rand"] }

ark-std = "0.5"
ark-ff = "0.5"
ark-serialize = "0.5"

itertools = "0.14"
thiserror = "2.0"
crypto-bigint = { version = "0.7.0-rc.6", features = ["zeroize"] }
displaydoc = "0.2"
sha3 = "0.10"
num-traits = "0.2"
rand = "0.9"
rand_core = "0.9"
rayon = { version = "1.10", optional = true }
blake3 = "1.8.2"
transpose = "0.2.3"
uninit = "0.6.2"

# P3
p3-merkle-tree = { git = "https://github.com/Plonky3/Plonky3.git", rev = "5ebf8e4" }
p3-symmetric = { git = "https://github.com/Plonky3/Plonky3.git", rev = "5ebf8e4" }
p3-field = { git = "https://github.com/Plonky3/Plonky3.git", rev = "5ebf8e4" }
p3-commit = { git = "https://github.com/Plonky3/Plonky3.git", rev = "5ebf8e4" }
p3-matrix = { git = "https://github.com/Plonky3/Plonky3.git", rev = "5ebf8e4" }
p3-util = { git = "https://github.com/Plonky3/Plonky3.git", rev = "5ebf8e4" }
p3-maybe-rayon = { git = "https://github.com/Plonky3/Plonky3.git", rev = "5ebf8e4", features = [] }

[dev-dependencies]
criterion = { workspace = true }
proptest = { workspace = true }

[lints]
workspace = true

[features]
parallel = ["dep:rayon"]
asm = ["ark-ff/asm", "sha3/asm"]

[[bench]]
name = "random_field_benches"
harness = false

[[bench]]
name = "zip_benches"
harness = false
